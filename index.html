<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>Telecom CAD PDF Editor PRO</title>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<!-- KONVA -->
<script src="https://unpkg.com/konva@9/konva.min.js"></script>

<!-- PDF EXPORT -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#0f172a;
  font-family:Arial;
  color:white;
}

#app{
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
}

/* =========================
TOPBAR
========================= */

#toolbar{
  height:60px;
  min-height:60px;
  background:#111827;
  display:flex;
  align-items:center;
  gap:8px;
  padding:8px;
  overflow-x:auto;
  border-bottom:1px solid #1e293b;
}

#toolbar::-webkit-scrollbar{
  display:none;
}

button,
input,
select{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  background:#1e293b;
  color:white;
  font-size:13px;
  flex-shrink:0;
}

button:hover{
  background:#38bdf8;
}

/* =========================
MAIN
========================= */

#main{
  flex:1;
  display:flex;
  overflow:hidden;
}

/* =========================
SIDEBAR
========================= */

#sidebar{
  width:240px;
  background:#111827;
  border-right:1px solid #1e293b;
  overflow-y:auto;
  padding:10px;
}

.section{
  margin-bottom:20px;
}

.section h3{
  margin-bottom:10px;
  color:#38bdf8;
}

.device-btn{
  width:100%;
  margin-bottom:6px;
  text-align:left;
}

/* =========================
CANVAS
========================= */

#canvas-wrap{
  flex:1;
  position:relative;
  overflow:hidden;
  background:#1e293b;
}

#stage-parent{
  width:100%;
  height:100%;
}

/* =========================
PROPERTIES
========================= */

#properties{
  position:absolute;
  top:10px;
  right:10px;
  width:220px;
  background:#111827;
  border:1px solid #334155;
  border-radius:12px;
  padding:10px;
  z-index:100;
}

#properties input{
  width:100%;
  margin-bottom:8px;
}

/* =========================
LEGEND
========================= */

.legend-item{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:4px;
}

/* =========================
MOBILE
========================= */

@media(max-width:768px){

  #sidebar{
    width:180px;
  }

  button,
  input,
  select{
    font-size:12px;
    padding:8px;
  }

}

</style>
</head>

<body>

<div id="app">

<!-- =========================
TOPBAR
========================= -->

<div id="toolbar">

<input
type="file"
id="pdfUpload"
accept="application/pdf,image/*">

<select id="toolSelect">

<option value="select">
Select
</option>

<option value="fiber">
Fiber
</option>

<option value="network">
Network
</option>

<option value="cctv">
CCTV
</option>

<option value="power">
Power
</option>

</select>

<input
type="number"
id="fiberCores"
placeholder="Fiber Core"
value="12"
min="1"
max="144">

<button onclick="clearCanvas()">
Clear
</button>

<button onclick="exportPDF()">
Export PDF
</button>

</div>

<!-- =========================
MAIN
========================= -->

<div id="main">

<!-- =========================
SIDEBAR
========================= -->

<div id="sidebar">

<div class="section">

<h3>Devices</h3>

<button class="device-btn"
onclick="addDevice('📷','CCTV')">
📷 CCTV
</button>

<button class="device-btn"
onclick="addDevice('🗄','Rack')">
🗄 Rack
</button>

<button class="device-btn"
onclick="addDevice('🖧','Switch')">
🖧 Switch
</button>

<button class="device-btn"
onclick="addDevice('📡','Router')">
📡 Router
</button>

<button class="device-btn"
onclick="addDevice('📶','WiFi')">
📶 WiFi
</button>

<button class="device-btn"
onclick="addDevice('🚪','Access Door')">
🚪 Access Door
</button>

<button class="device-btn"
onclick="addDevice('⛔','Barrier')">
⛔ Barrier
</button>

<button class="device-btn"
onclick="addDevice('💽','NVR')">
💽 NVR
</button>

<button class="device-btn"
onclick="addDevice('⭕','Manhole')">
⭕ Manhole
</button>

</div>

<div class="section">

<h3>Fiber Core Legend</h3>

<div id="legend"></div>

</div>

</div>

<!-- =========================
CANVAS
========================= -->

<div id="canvas-wrap">

<div id="properties">

<h3>Properties</h3>

<input placeholder="Name">
<input placeholder="IP Address">
<input placeholder="Notes">

</div>

<div id="stage-parent"></div>

</div>

</div>

</div>

<script>

/* =========================
PDF JS
========================= */

pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

/* =========================
STAGE
========================= */

const stage = new Konva.Stage({

  container:'stage-parent',

  width:
  document
  .getElementById('canvas-wrap')
  .clientWidth,

  height:
  document
  .getElementById('canvas-wrap')
  .clientHeight,

  draggable:true

});

/* =========================
LAYERS
========================= */

const gridLayer =
new Konva.Layer();

const pdfLayer =
new Konva.Layer();

const cableLayer =
new Konva.Layer();

const deviceLayer =
new Konva.Layer();

stage.add(gridLayer);
stage.add(pdfLayer);
stage.add(cableLayer);
stage.add(deviceLayer);

/* =========================
GRID
========================= */

function drawGrid(){

  const size = 50;

  for(let i=0;i<5000/size;i++){

    gridLayer.add(

      new Konva.Line({

        points:[
          i*size,
          0,
          i*size,
          5000
        ],

        stroke:'#1e293b',
        strokeWidth:1

      })

    );

  }

  for(let j=0;j<5000/size;j++){

    gridLayer.add(

      new Konva.Line({

        points:[
          0,
          j*size,
          5000,
          j*size
        ],

        stroke:'#1e293b',
        strokeWidth:1

      })

    );

  }

}

drawGrid();

/* =========================
TELECOM COLORS
========================= */

const telecomColors=[

'red',
'blue',
'yellow',
'green',
'orange',
'purple',
'cyan',
'magenta',
'lime',
'white',
'pink',
'brown',

'#ff4444',
'#4488ff',
'#ffee44',
'#44ff44',
'#ff8800',
'#8844ff',
'#00ffff',
'#ff00ff',
'#88ff00',
'#cccccc',
'#ff99cc',
'#8B4513'

];

/* =========================
LEGEND
========================= */

function updateLegend(){

  const total =
  parseInt(
    document
    .getElementById('fiberCores')
    .value
  );

  const legend =
  document.getElementById(
    'legend'
  );

  legend.innerHTML='';

  for(let i=0;i<total;i++){

    const row =
    document.createElement('div');

    row.className='legend-item';

    row.innerHTML=`

    <div style="
    width:18px;
    height:18px;
    background:
    ${telecomColors[i%telecomColors.length]};
    border-radius:4px;
    "></div>

    <span>
    Core ${i+1}
    </span>

    `;

    legend.appendChild(row);

  }

}

updateLegend();

document
.getElementById('fiberCores')
.addEventListener(
'input',
updateLegend
);

/* =========================
TOOLS
========================= */

let drawing=false;
let activeCable=null;

/* =========================
START DRAW
========================= */

stage.on('mousedown touchstart',()=>{

  const tool =
  document
  .getElementById('toolSelect')
  .value;

  if(tool==='select')
  return;

  const pos =
  stage.getPointerPosition();

  /* =========================
  FIBER
  ========================= */

  if(tool==='fiber'){

    const cores =
    parseInt(
      document
      .getElementById('fiberCores')
      .value
    );

    const group =
    new Konva.Group({
      draggable:true
    });

    for(let i=0;i<cores;i++){

      const line =
      new Konva.Line({

        points:[
          pos.x,
          pos.y+(i*3),
          pos.x,
          pos.y+(i*3)
        ],

        stroke:
        telecomColors[
          i % telecomColors.length
        ],

        strokeWidth:2,

        lineCap:'round'

      });

      group.add(line);

    }

    cableLayer.add(group);

    activeCable=group;

  }

  /* =========================
  NORMAL CABLES
  ========================= */

  else{

    let color='white';
    let width=3;

    if(tool==='network'){
      color='deepskyblue';
    }

    if(tool==='cctv'){
      color='limegreen';
    }

    if(tool==='power'){
      color='red';
      width=5;
    }

    activeCable =
    new Konva.Line({

      points:[
        pos.x,
        pos.y,
        pos.x,
        pos.y
      ],

      stroke:color,

      strokeWidth:width,

      lineCap:'round',

      draggable:true

    });

    cableLayer.add(activeCable);

  }

  drawing=true;

});

/* =========================
MOVE DRAW
========================= */

stage.on('mousemove touchmove',()=>{

  if(!drawing || !activeCable)
  return;

  const tool =
  document
  .getElementById('toolSelect')
  .value;

  const pos =
  stage.getPointerPosition();

  if(tool==='fiber'){

    activeCable
    .getChildren()
    .forEach((line,i)=>{

      const pts =
      line.points();

      line.points([

        pts[0],
        pts[1],

        pos.x,
        pos.y+(i*3)

      ]);

    });

  }

  else{

    const pts =
    activeCable.points();

    activeCable.points([

      pts[0],
      pts[1],

      pos.x,
      pos.y

    ]);

  }

  cableLayer.batchDraw();

});

/* =========================
END DRAW
========================= */

stage.on('mouseup touchend',()=>{

  drawing=false;
  activeCable=null;

});

/* =========================
ADD DEVICE
========================= */

function addDevice(icon,name){

  const group =
  new Konva.Group({

    x:200,
    y:200,

    draggable:true

  });

  const rect =
  new Konva.Rect({

    width:60,
    height:60,

    fill:'#111827',

    stroke:'#38bdf8',

    cornerRadius:10

  });

  const text =
  new Konva.Text({

    text:icon,

    fontSize:32,

    x:12,
    y:8,

    fill:'white'

  });

  const label =
  new Konva.Text({

    text:name,

    fontSize:12,

    y:65,

    fill:'white'

  });

  group.add(rect);
  group.add(text);
  group.add(label);

  deviceLayer.add(group);

}

/* =========================
UPLOAD PDF / IMAGE
========================= */

document
.getElementById('pdfUpload')
.addEventListener(
'change',
async(e)=>{

  const file=e.target.files[0];

  if(!file) return;

  /* PDF */

  if(file.type==='application/pdf'){

    const reader =
    new FileReader();

    reader.onload =
    async function(){

      const typedarray =
      new Uint8Array(
        this.result
      );

      const pdf =
      await pdfjsLib
      .getDocument(typedarray)
      .promise;

      const page =
      await pdf.getPage(1);

      const viewport =
      page.getViewport({
        scale:2
      });

      const canvas =
      document.createElement(
        'canvas'
      );

      const context =
      canvas.getContext('2d');

      canvas.width=
      viewport.width;

      canvas.height=
      viewport.height;

      await page.render({

        canvasContext:context,

        viewport:viewport

      }).promise;

      const img =
      new Image();

      img.onload=function(){

        pdfLayer.destroyChildren();

        const bg =
        new Konva.Image({

          image:img,

          x:0,
          y:0,

          width:
          viewport.width,

          height:
          viewport.height

        });

        pdfLayer.add(bg);

        pdfLayer.draw();

      }

      img.src=
      canvas.toDataURL();

    }

    reader.readAsArrayBuffer(file);

  }

  /* IMAGE */

  else{

    const reader =
    new FileReader();

    reader.onload=
    function(ev){

      const img =
      new Image();

      img.onload=
      function(){

        pdfLayer.destroyChildren();

        const bg =
        new Konva.Image({

          image:img,

          x:0,
          y:0,

          width:img.width,

          height:img.height

        });

        pdfLayer.add(bg);

        pdfLayer.draw();

      }

      img.src=
      ev.target.result;

    }

    reader.readAsDataURL(file);

  }

});

/* =========================
ZOOM
========================= */

stage.on('wheel',(e)=>{

  e.evt.preventDefault();

  const scaleBy=1.05;

  const oldScale=
  stage.scaleX();

  const pointer=
  stage.getPointerPosition();

  const mousePointTo={

    x:
    (pointer.x-stage.x())
    /oldScale,

    y:
    (pointer.y-stage.y())
    /oldScale

  };

  const direction=
  e.evt.deltaY>0
  ? -1
  : 1;

  const newScale=
  direction>0
  ? oldScale*scaleBy
  : oldScale/scaleBy;

  stage.scale({
    x:newScale,
    y:newScale
  });

  const newPos={

    x:
    pointer.x -
    mousePointTo.x
    *newScale,

    y:
    pointer.y -
    mousePointTo.y
    *newScale

  };

  stage.position(newPos);

  stage.batchDraw();

});

/* =========================
CLEAR
========================= */

function clearCanvas(){

  cableLayer.destroyChildren();
  deviceLayer.destroyChildren();

  cableLayer.draw();
  deviceLayer.draw();

}

/* =========================
EXPORT PDF
========================= */

async function exportPDF(){

  const data =
  stage.toDataURL({
    pixelRatio:2
  });

  const {jsPDF} =
  window.jspdf;

  const pdf =
  new jsPDF(
    'landscape',
    'px',
    [
      stage.width(),
      stage.height()
    ]
  );

  pdf.addImage(
    data,
    'PNG',
    0,
    0,
    stage.width(),
    stage.height()
  );

  pdf.save(
    'telecom-layout.pdf'
  );

}

/* =========================
RESIZE
========================= */

window.addEventListener(
'resize',
()=>{

  stage.width(
    document
    .getElementById(
      'canvas-wrap'
    )
    .clientWidth
  );

  stage.height(
    document
    .getElementById(
      'canvas-wrap'
    )
    .clientHeight
  );

});

</script>

</body>
  </html>
