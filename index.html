<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Telecom CAD Layout Editor</title>

<script src="https://unpkg.com/konva@9/konva.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#0f172a;
  font-family:Arial;
  color:white;
}

#toolbar{
  height:60px;
  background:#111827;
  display:flex;
  align-items:center;
  gap:8px;
  padding:8px;
  overflow-x:auto;
}

button,select,input{
  padding:8px 10px;
  border:none;
  border-radius:8px;
  background:#1e293b;
  color:white;
  font-size:13px;
}

#main{
  display:flex;
  height:calc(100% - 60px);
}

#sidebar{
  width:220px;
  background:#111827;
  padding:10px;
  overflow-y:auto;
}

#canvas{
  flex:1;
  background:#1e293b;
}

</style>
</head>

<body>

<!-- TOOLBAR -->
<div id="toolbar">

<input type="file" id="upload">

<select id="tool">
  <option value="select">Select</option>
  <option value="fiber">Fiber</option>
  <option value="network">Network</option>
  <option value="cctv">CCTV</option>
  <option value="power">Power</option>
</select>

<input type="number" id="cores" value="12" min="1" max="144">

<button onclick="exportPDF()">Export</button>
<button onclick="clearAll()">Clear</button>

</div>

<!-- MAIN -->
<div id="main">

<div id="sidebar">
<h3>Devices</h3>

<button onclick="addDevice('📷 CCTV')">Camera</button>
<button onclick="addDevice('🗄 Rack')">Rack</button>
<button onclick="addDevice('🖧 Switch')">Switch</button>
<button onclick="addDevice('📡 Router')">Router</button>
<button onclick="addDevice('📶 AP')">WiFi</button>
<button onclick="addDevice('💽 NVR')">NVR</button>
<button onclick="addDevice('⭕ Manhole')">Manhole</button>

</div>

<div id="canvas"></div>

</div>

<script>

/* =========================
STAGE
========================= */

const stage = new Konva.Stage({
  container:'canvas',
  width:window.innerWidth,
  height:window.innerHeight,
  draggable:true
});

const cableLayer = new Konva.Layer();
const deviceLayer = new Konva.Layer();
const bgLayer = new Konva.Layer();

stage.add(bgLayer);
stage.add(cableLayer);
stage.add(deviceLayer);

/* =========================
COLORS
========================= */

const colors = [
  'red','blue','yellow','green','orange','purple',
  'cyan','magenta','lime','white','pink','brown'
];

/* =========================
STATE
========================= */

let tool='select';
let drawing=false;
let active=null;

/* =========================
TOOL CHANGE
========================= */

document.getElementById('tool').onchange=(e)=>{
  tool=e.target.value;
};

/* =========================
DRAW START
========================= */

stage.on('mousedown touchstart',()=>{

  if(tool==='select') return;

  const pos=stage.getPointerPosition();

  /* =========================
  FIBER (multi core)
  ========================= */

  if(tool==='fiber'){

    const cores=parseInt(document.getElementById('cores').value);

    const group=new Konva.Group({draggable:true});

    for(let i=0;i<cores;i++){

      const line=new Konva.Line({
        points:[pos.x,pos.y+i*3,pos.x,pos.y+i*3],
        stroke:colors[i%colors.length],
        strokeWidth:2,
        lineCap:'round'
      });

      group.add(line);
    }

    cableLayer.add(group);
    active=group;

  }

  /* =========================
  NORMAL CABLES
  ========================= */

  else{

    let color='white';
    let width=3;

    if(tool==='network') color='deepskyblue';
    if(tool==='cctv') color='limegreen';
    if(tool==='power') {color='red'; width=5;}

    active=new Konva.Line({
      points:[pos.x,pos.y,pos.x,pos.y],
      stroke:color,
      strokeWidth:width,
      lineCap:'round',
      draggable:true
    });

    cableLayer.add(active);
  }

  drawing=true;

});

/* =========================
DRAW MOVE
========================= */

stage.on('mousemove touchmove',()=>{

  if(!drawing || !active) return;

  const pos=stage.getPointerPosition();

  if(tool==='fiber'){

    active.getChildren().forEach((l,i)=>{

      const p=l.points();

      l.points([p[0],p[1],pos.x,pos.y+i*3]);

    });

  }else{

    const p=active.points();

    active.points([p[0],p[1],pos.x,pos.y]);

  }

  cableLayer.batchDraw();

});

/* =========================
DRAW END
========================= */

stage.on('mouseup touchend',()=>{

  drawing=false;
  active=null;

});

/* =========================
DEVICE
========================= */

function addDevice(text){

  const g=new Konva.Group({
    x:200,
    y:200,
    draggable:true
  });

  const box=new Konva.Rect({
    width:60,
    height:60,
    fill:'#111827',
    stroke:'#38bdf8',
    cornerRadius:8
  });

  const label=new Konva.Text({
    text:text,
    fontSize:20,
    fill:'white',
    x:10,
    y:18
  });

  g.add(box);
  g.add(label);

  deviceLayer.add(g);

}

/* =========================
CLEAR
========================= */

function clearAll(){
  cableLayer.destroyChildren();
  deviceLayer.destroyChildren();
}

/* =========================
UPLOAD PDF/IMAGE
========================= */

document.getElementById('upload').onchange=(e)=>{

  const file=e.target.files[0];

  if(!file) return;

  const reader=new FileReader();

  reader.onload=(ev)=>{

    const img=new Image();

    img.onload=()=>{

      bgLayer.destroyChildren();

      const bg=new Konva.Image({
        image:img,
        x:0,
        y:0,
        width:stage.width(),
        height:stage.height()
      });

      bgLayer.add(bg);
      bgLayer.draw();

    };

    img.src=ev.target.result;

  };

  reader.readAsDataURL(file);

};

/* =========================
ZOOM (CAD STYLE)
========================= */

stage.on('wheel',(e)=>{

  e.evt.preventDefault();

  const scaleBy=1.05;

  let oldScale=stage.scaleX();

  const pointer=stage.getPointerPosition();

  const mousePointTo={
    x:(pointer.x-stage.x())/oldScale,
    y:(pointer.y-stage.y())/oldScale
  };

  const direction=e.evt.deltaY>0?-1:1;

  let newScale=direction>0?oldScale*scaleBy:oldScale/scaleBy;

  stage.scale({x:newScale,y:newScale});

  const newPos={
    x:pointer.x-mousePointTo.x*newScale,
    y:pointer.y-mousePointTo.y*newScale
  };

  stage.position(newPos);

  stage.batchDraw();

});

/* =========================
EXPORT PDF (FIXED FULL SIZE)
========================= */

async function exportPDF(){

  const data=stage.toDataURL({pixelRatio:2});

  const {jsPDF}=window.jspdf;

  const pdf=new jsPDF({
    orientation:'landscape',
    unit:'px',
    format:[stage.width(),stage.height()]
  });

  pdf.addImage(
    data,
    'PNG',
    0,
    0,
    stage.width(),
    stage.height()
  );

  pdf.save('telecom-layout.pdf');

}

/* =========================
RESIZE FIX
========================= */

window.addEventListener('resize',()=>{

  stage.width(window.innerWidth);
  stage.height(window.innerHeight);

});

</script>

</body>
  </html>
