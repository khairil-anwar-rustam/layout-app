<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>Fiber Network Layout PRO</title>

<script src="https://unpkg.com/konva@9/konva.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

#app{
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
}

/* TOPBAR */

#toolbar{
  height:60px;
  background:#111827;
  display:flex;
  align-items:center;
  gap:8px;
  padding:8px;
  overflow-x:auto;
  flex-shrink:0;
}

button,
select,
input{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  background:#1e293b;
  color:white;
  font-size:14px;
}

/* MAIN */

#main{
  flex:1;
  display:flex;
  overflow:hidden;
}

/* SIDEBAR */

#sidebar{
  width:220px;
  background:#111827;
  border-right:1px solid #1e293b;
  overflow-y:auto;
  padding:10px;
}

.section{
  margin-bottom:20px;
}

.section h3{
  color:#38bdf8;
  margin-bottom:10px;
}

.device-btn{
  width:100%;
  margin-bottom:6px;
  text-align:left;
}

/* CANVAS */

#canvas-wrap{
  flex:1;
  position:relative;
  background:#1e293b;
}

#stage-parent{
  width:100%;
  height:100%;
}

/* MOBILE */

@media(max-width:768px){

  #sidebar{
    width:160px;
  }

  button,
  select,
  input{
    font-size:12px;
    padding:8px;
  }

}

</style>
</head>

<body>

<div id="app">

<!-- TOOLBAR -->

<div id="toolbar">

<select id="fiberCore">

<option value="1">1 Core</option>
<option value="2">2 Core</option>
<option value="4">4 Core</option>
<option value="6">6 Core</option>
<option value="8">8 Core</option>
<option value="12">12 Core</option>

</select>

<button onclick="setTool('select')">
Select
</button>

<button onclick="setTool('fiber')">
Fiber
</button>

<button onclick="setTool('network')">
Network
</button>

<button onclick="setTool('cctv')">
CCTV
</button>

<button onclick="setTool('power')">
Power
</button>

<button onclick="clearCanvas()">
Clear
</button>

<button onclick="exportPDF()">
Export
</button>

</div>

<!-- MAIN -->

<div id="main">

<!-- SIDEBAR -->

<div id="sidebar">

<div class="section">

<h3>Devices</h3>

<button class="device-btn"
onclick="addDevice('📷')">
📷 Camera
</button>

<button class="device-btn"
onclick="addDevice('🗄')">
🗄 Rack
</button>

<button class="device-btn"
onclick="addDevice('🖧')">
🖧 Switch
</button>

<button class="device-btn"
onclick="addDevice('📡')">
📡 Router
</button>

<button class="device-btn"
onclick="addDevice('📶')">
📶 AP
</button>

<button class="device-btn"
onclick="addDevice('🚪')">
🚪 Door
</button>

<button class="device-btn"
onclick="addDevice('⛔')">
⛔ Barrier
</button>

<button class="device-btn"
onclick="addDevice('💽')">
💽 NVR
</button>

<button class="device-btn"
onclick="addDevice('⭕')">
⭕ Manhole
</button>

</div>

</div>

<!-- CANVAS -->

<div id="canvas-wrap">

<div id="stage-parent"></div>

</div>

</div>

</div>

<script>

/* =========================
STAGE
========================= */

const stage = new Konva.Stage({

  container:'stage-parent',

  width:
  document.getElementById(
    'canvas-wrap'
  ).clientWidth,

  height:
  document.getElementById(
    'canvas-wrap'
  ).clientHeight

});

/* =========================
LAYERS
========================= */

const bgLayer = new Konva.Layer();
const drawLayer = new Konva.Layer();
const deviceLayer = new Konva.Layer();

stage.add(bgLayer);
stage.add(drawLayer);
stage.add(deviceLayer);

/* =========================
TOOLS
========================= */

let currentTool='select';
let drawing=false;
let activeShape=null;

/* =========================
FIBER COLORS
========================= */

const fiberColors=[
'red',
'blue',
'yellow',
'green',
'orange',
'purple',
'cyan',
'magenta',
'lime',
'white',
'pink',
'brown'
];

/* =========================
SET TOOL
========================= */

function setTool(tool){

  currentTool=tool;

}

/* =========================
DRAW START
========================= */

stage.on('mousedown touchstart',()=>{

  if(currentTool==='select')
  return;

  const pos =
  stage.getPointerPosition();

  /* FIBER */

  if(currentTool==='fiber'){

    const coreCount =
    parseInt(
      document.getElementById(
        'fiberCore'
      ).value
    );

    const group =
    new Konva.Group({
      draggable:true
    });

    for(let i=0;i<coreCount;i++){

      const line =
      new Konva.Line({

        points:[
          pos.x,
          pos.y+(i*4),
          pos.x,
          pos.y+(i*4)
        ],

        stroke:
        fiberColors[i],

        strokeWidth:2,

        lineCap:'round'

      });

      group.add(line);

    }

    drawLayer.add(group);

    activeShape=group;

  }

  /* NORMAL LINES */

  else{

    let color='white';
    let width=3;

    if(currentTool==='network'){
      color='deepskyblue';
    }

    if(currentTool==='cctv'){
      color='limegreen';
    }

    if(currentTool==='power'){
      color='red';
      width=5;
    }

    activeShape =
    new Konva.Line({

      points:[
        pos.x,
        pos.y,
        pos.x,
        pos.y
      ],

      stroke:color,

      strokeWidth:width,

      lineCap:'round',

      draggable:true

    });

    drawLayer.add(activeShape);

  }

  drawing=true;

  drawLayer.draw();

});

/* =========================
DRAW MOVE
========================= */

stage.on('mousemove touchmove',()=>{

  if(!drawing || !activeShape)
  return;

  const pos =
  stage.getPointerPosition();

  /* FIBER */

  if(currentTool==='fiber'){

    activeShape
    .getChildren()
    .forEach((line,i)=>{

      const pts=line.points();

      line.points([

        pts[0],
        pts[1],

        pos.x,
        pos.y+(i*4)

      ]);

    });

  }

  /* NORMAL */

  else{

    const pts =
    activeShape.points();

    activeShape.points([

      pts[0],
      pts[1],

      pos.x,
      pos.y

    ]);

  }

  drawLayer.batchDraw();

});

/* =========================
DRAW END
========================= */

stage.on('mouseup touchend',()=>{

  drawing=false;
  activeShape=null;

});

/* =========================
ADD DEVICE
========================= */

function addDevice(icon){

  const group =
  new Konva.Group({

    x:200,
    y:200,
    draggable:true

  });

  const rect =
  new Konva.Rect({

    width:50,
    height:50,
    fill:'#111827',
    stroke:'#38bdf8',
    cornerRadius:10

  });

  const text =
  new Konva.Text({

    text:icon,
    fontSize:28,
    x:10,
    y:8,
    fill:'white'

  });

  group.add(rect);
  group.add(text);

  deviceLayer.add(group);

  deviceLayer.draw();

}

/* =========================
CLEAR
========================= */

function clearCanvas(){

  drawLayer.destroyChildren();
  deviceLayer.destroyChildren();

  drawLayer.draw();
  deviceLayer.draw();

}

/* =========================
EXPORT PDF
========================= */

async function exportPDF(){

  const data =
  stage.toDataURL({
    pixelRatio:2
  });

  const {jsPDF} =
  window.jspdf;

  const pdf =
  new jsPDF(
    'landscape',
    'px',
    [
      stage.width(),
      stage.height()
    ]
  );

  pdf.addImage(

    data,
    'PNG',

    0,
    0,

    stage.width(),
    stage.height()

  );

  pdf.save(
    'network-layout.pdf'
  );

}

/* =========================
RESIZE
========================= */

window.addEventListener(
'resize',
()=>{

  stage.width(

    document.getElementById(
      'canvas-wrap'
    ).clientWidth

  );

  stage.height(

    document.getElementById(
      'canvas-wrap'
    ).clientHeight

  );

});

</script>

</body>
  </html>
