<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Network Layout PDF Editor PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/konva/9.3.11/konva.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  touch-action:none;
}

body{
  font-family:Arial,sans-serif;
  background:#0f172a;
  color:white;
  overflow:hidden;
}

#app{
  display:flex;
  flex-direction:column;
  height:100vh;
}

#toolbar{
  height:65px;
  background:#111827;
  display:flex;
  align-items:center;
  gap:8px;
  padding:10px;
  overflow-x:auto;
  border-bottom:1px solid #1e293b;
}

button,input{
  border:none;
  border-radius:10px;
  background:#1e293b;
  color:white;
  padding:10px 14px;
  font-size:14px;
  white-space:nowrap;
}

button:hover{
  background:#38bdf8;
}

#main{
  flex:1;
  display:flex;
  overflow:hidden;
}

#sidebar{
  width:240px;
  background:#111827;
  overflow-y:auto;
  border-right:1px solid #1e293b;
  padding:15px;
}

.section{
  margin-bottom:25px;
}

.section h3{
  margin-bottom:10px;
  color:#38bdf8;
}

.device-btn{
  width:100%;
  margin-bottom:8px;
  text-align:left;
}

#canvas-container{
  flex:1;
  overflow:hidden;
  position:relative;
  background:#1e293b;
}

#stage-parent{
  width:100%;
  height:100%;
}

.legend-item{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:8px;
}

.color-box{
  width:20px;
  height:20px;
  border-radius:5px;
}

#properties{
  position:absolute;
  top:20px;
  right:20px;
  width:220px;
  background:#111827;
  border:1px solid #334155;
  border-radius:12px;
  padding:15px;
  z-index:100;
}

#properties h3{
  margin-bottom:10px;
}

#properties input{
  width:100%;
  margin-bottom:10px;
}

.mobile-note{
  margin-top:10px;
  color:#f59e0b;
  font-size:12px;
}

@media(max-width:768px){

  #sidebar{
    width:180px;
  }

  button,input{
    font-size:12px;
    padding:8px;
  }

  #properties{
    width:180px;
  }

}

</style>
</head>

<body>

<div id="app">

<div id="toolbar">

<input type="file" id="pdfUpload" accept="application/pdf,image/*"/>

<button onclick="setTool('select')">Select</button>
<button onclick="setTool('fiber')">Fiber</button>
<button onclick="setTool('network')">Network</button>
<button onclick="setTool('cctv')">CCTV</button>
<button onclick="setTool('power')">Power</button>
<button onclick="setTool('measure')">Measure</button>

<button onclick="clearCanvas()">Clear</button>
<button onclick="exportPDF()">Export PDF</button>

</div>

<div id="main">

<div id="sidebar">

<div class="section">

<h3>Devices</h3>

<button class="device-btn" onclick="addDevice('camera')">📷 CCTV Camera</button>
<button class="device-btn" onclick="addDevice('ptz')">🎥 PTZ Camera</button>
<button class="device-btn" onclick="addDevice('rack')">🗄 Rack</button>
<button class="device-btn" onclick="addDevice('switch')">🖧 Switch</button>
<button class="device-btn" onclick="addDevice('router')">📡 Router</button>
<button class="device-btn" onclick="addDevice('wifi')">📶 WiFi AP</button>
<button class="device-btn" onclick="addDevice('door')">🚪 Access Door</button>
<button class="device-btn" onclick="addDevice('barrier')">⛔ Barrier Gate</button>
<button class="device-btn" onclick="addDevice('nvr')">💽 NVR</button>
<button class="device-btn" onclick="addDevice('manhole')">⭕ Manhole</button>
<button class="device-btn" onclick="addDevice('pole')">📍 Pole</button>

</div>

<div class="section">

<h3>Legend</h3>

<div class="legend-item">
<div class="color-box" style="background:orange"></div>
<span>Fiber Optic</span>
</div>

<div class="legend-item">
<div class="color-box" style="background:deepskyblue"></div>
<span>Network Cable</span>
</div>

<div class="legend-item">
<div class="color-box" style="background:limegreen"></div>
<span>CCTV Cable</span>
</div>

<div class="legend-item">
<div class="color-box" style="background:red"></div>
<span>Power Cable</span>
</div>

</div>

<div class="section">

<h3>Layers</h3>

<button class="device-btn" onclick="toggleLayer('fiber')">Toggle Fiber</button>
<button class="device-btn" onclick="toggleLayer('network')">Toggle Network</button>
<button class="device-btn" onclick="toggleLayer('cctv')">Toggle CCTV</button>
<button class="device-btn" onclick="toggleLayer('power')">Toggle Power</button>
<button class="device-btn" onclick="toggleLayer('devices')">Toggle Devices</button>

<div class="mobile-note">
Pinch to zoom • Drag with two fingers
</div>

</div>

</div>

<div id="canvas-container">

<div id="properties">

<h3>Properties</h3>

<input id="deviceName" placeholder="Device Name"/>
<input id="deviceIP" placeholder="IP Address"/>
<input id="deviceNote" placeholder="Notes"/>

</div>

<div id="stage-parent"></div>

</div>

</div>

</div>

<script>

pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let currentTool='select';
let drawing=false;
let currentLine;
let selectedObject=null;

let lastDist=0;
let lastCenter=null;

const stage = new Konva.Stage({
  container:'stage-parent',
  width:window.innerWidth,
  height:window.innerHeight,
  draggable:true
});

const backgroundLayer = new Konva.Layer();
const fiberLayer = new Konva.Layer();
const networkLayer = new Konva.Layer();
const cctvLayer = new Konva.Layer();
const powerLayer = new Konva.Layer();
const devicesLayer = new Konva.Layer();

stage.add(backgroundLayer);
stage.add(fiberLayer);
stage.add(networkLayer);
stage.add(cctvLayer);
stage.add(powerLayer);
stage.add(devicesLayer);

function setTool(tool){
  currentTool=tool;
}

function getLineStyle(tool){

  switch(tool){

    case 'fiber':
      return {
        stroke:'orange',
        dash:[],
        width:4,
        layer:fiberLayer
      };

    case 'network':
      return {
        stroke:'deepskyblue',
        dash:[],
        width:3,
        layer:networkLayer
      };

    case 'cctv':
      return {
        stroke:'limegreen',
        dash:[10,5],
        width:3,
        layer:cctvLayer
      };

    case 'power':
      return {
        stroke:'red',
        dash:[],
        width:5,
        layer:powerLayer
      };

    case 'measure':
      return {
        stroke:'yellow',
        dash:[5,5],
        width:2,
        layer:networkLayer
      };

  }

}

function getDistance(p1,p2){

  return Math.sqrt(
    (p2.x-p1.x)*(p2.x-p1.x)+
    (p2.y-p1.y)*(p2.y-p1.y)
  );

}

function getCenter(p1,p2){

  return {
    x:(p1.x+p2.x)/2,
    y:(p1.y+p2.y)/2
  };

}

stage.on('touchmove',function(e){

  const touch1=e.evt.touches[0];
  const touch2=e.evt.touches[1];

  if(touch1 && touch2){

    e.evt.preventDefault();

    const p1={
      x:touch1.clientX,
      y:touch1.clientY
    };

    const p2={
      x:touch2.clientX,
      y:touch2.clientY
    };

    if(!lastCenter){

      lastCenter=getCenter(p1,p2);
      return;

    }

    const newCenter=getCenter(p1,p2);

    const dist=getDistance(p1,p2);

    if(!lastDist){
      lastDist=dist;
    }

    const scale=stage.scaleX()*(dist/lastDist);

    stage.scale({
      x:scale,
      y:scale
    });

    const pointTo={
      x:(newCenter.x-stage.x())/stage.scaleX(),
      y:(newCenter.y-stage.y())/stage.scaleX()
    };

    stage.position({
      x:newCenter.x-pointTo.x*scale,
      y:newCenter.y-pointTo.y*scale
    });

    lastDist=dist;
    lastCenter=newCenter;

  }

});

stage.on('touchend',()=>{

  lastDist=0;
  lastCenter=null;

});

stage.on('wheel',(e)=>{

  e.evt.preventDefault();

  const scaleBy=1.05;

  const oldScale=stage.scaleX();

  const pointer=stage.getPointerPosition();

  const direction=e.evt.deltaY>0?-1:1;

  const newScale=
    direction>0
    ? oldScale*scaleBy
    : oldScale/scaleBy;

  stage.scale({
    x:newScale,
    y:newScale
  });

  const mousePointTo={
    x:(pointer.x-stage.x())/oldScale,
    y:(pointer.y-stage.y())/oldScale
  };

  const newPos={
    x:pointer.x-mousePointTo.x*newScale,
    y:pointer.y-mousePointTo.y*newScale
  };

  stage.position(newPos);

});

stage.on('mousedown touchstart',(e)=>{

  if(currentTool==='select') return;

  if(e.evt.touches && e.evt.touches.length>1) return;

  const pos=stage.getPointerPosition();

  const style=getLineStyle(currentTool);

  drawing=true;

  currentLine=new Konva.Line({
    points:[pos.x,pos.y,pos.x,pos.y],
    stroke:style.stroke,
    strokeWidth:style.width,
    lineCap:'round',
    lineJoin:'round',
    dash:style.dash,
    draggable:true
  });

  style.layer.add(currentLine);

});

stage.on('mousemove touchmove',()=>{

  if(!drawing || !currentLine) return;

  const pos=stage.getPointerPosition();

  const points=currentLine.points();

  currentLine.points([
    points[0],
    points[1],
    pos.x,
    pos.y
  ]);

  currentLine.getLayer().batchDraw();

});

stage.on('mouseup touchend',()=>{

  drawing=false;

});

function addDevice(type){

  let label='';
  let color='white';

  switch(type){

    case 'camera':
      label='📷';
      color='lime';
      break;

    case 'ptz':
      label='🎥';
      color='cyan';
      break;

    case 'rack':
      label='🗄';
      color='orange';
      break;

    case 'switch':
      label='🖧';
      color='deepskyblue';
      break;

    case 'router':
      label='📡';
      color='violet';
      break;

    case 'wifi':
      label='📶';
      color='skyblue';
      break;

    case 'door':
      label='🚪';
      color='magenta';
      break;

    case 'barrier':
      label='⛔';
      color='red';
      break;

    case 'nvr':
      label='💽';
      color='yellow';
      break;

    case 'manhole':
      label='⭕';
      color='brown';
      break;

    case 'pole':
      label='📍';
      color='white';
      break;

  }

  const group=new Konva.Group({
    x:300,
    y:200,
    draggable:true
  });

  const bg=new Konva.Rect({
    x:-10,
    y:-10,
    width:60,
    height:60,
    fill:'rgba(0,0,0,0.35)',
    cornerRadius:12
  });

  const icon=new Konva.Text({
    text:label,
    fontSize:34,
    fill:color
  });

  group.add(bg);
  group.add(icon);

  group.on('tap click',()=>{

    selectedObject=group;

    document.getElementById('deviceName').value=
      type.toUpperCase();

  });

  devicesLayer.add(group);

  devicesLayer.draw();

}

function toggleLayer(layer){

  const layers={
    fiber:fiberLayer,
    network:networkLayer,
    cctv:cctvLayer,
    power:powerLayer,
    devices:devicesLayer
  };

  const l=layers[layer];

  l.visible(!l.visible());

  l.draw();

}

function clearCanvas(){

  fiberLayer.destroyChildren();
  networkLayer.destroyChildren();
  cctvLayer.destroyChildren();
  powerLayer.destroyChildren();
  devicesLayer.destroyChildren();

  fiberLayer.draw();
  networkLayer.draw();
  cctvLayer.draw();
  powerLayer.draw();
  devicesLayer.draw();

}

async function exportPDF(){

  const dataURL=stage.toDataURL({
    pixelRatio:2
  });

  const {jsPDF}=window.jspdf;

  const pdf=new jsPDF(
    'landscape',
    'px',
    [2000,1200]
  );

  pdf.addImage(
    dataURL,
    'PNG',
    0,
    0,
    2000,
    1200
  );

  pdf.save('network-layout.pdf');

}

const upload=document.getElementById('pdfUpload');

upload.addEventListener('change',async(e)=>{

  const file=e.target.files[0];

  if(!file) return;

  if(file.type==='application/pdf'){

    const reader=new FileReader();

    reader.onload=async function(){

      const typedarray=new Uint8Array(this.result);

      const pdf=await pdfjsLib.getDocument(typedarray).promise;

      const page=await pdf.getPage(1);

      const viewport=page.getViewport({
        scale:2
      });

      const canvas=document.createElement('canvas');

      const context=canvas.getContext('2d');

      canvas.width=viewport.width;
      canvas.height=viewport.height;

      await page.render({
        canvasContext:context,
        viewport:viewport
      }).promise;

      const imageObj=new Image();

      imageObj.onload=function(){

        backgroundLayer.destroyChildren();

        const bg=new Konva.Image({
          image:imageObj,
          x:0,
          y:0,
          width:viewport.width,
          height:viewport.height
        });

        backgroundLayer.add(bg);

        backgroundLayer.draw();

      }

      imageObj.src=canvas.toDataURL();

    }

    reader.readAsArrayBuffer(file);

  }else{

    const reader=new FileReader();

    reader.onload=function(ev){

      const imageObj=new Image();

      imageObj.onload=function(){

        backgroundLayer.destroyChildren();

        const bg=new Konva.Image({
          image:imageObj,
          x:0,
          y:0,
          width:imageObj.width,
          height:imageObj.height
        });

        backgroundLayer.add(bg);

        backgroundLayer.draw();

      }

      imageObj.src=ev.target.result;

    }

    reader.readAsDataURL(file);

  }

});

window.addEventListener('resize',()=>{

  stage.width(window.innerWidth);
  stage.height(window.innerHeight);

});

</script>

</body>
  </html>
