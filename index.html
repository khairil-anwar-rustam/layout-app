<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Job Report Pro</title>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.container {
  padding: 12px;
  max-width: 600px;
  margin: auto;
}

h2 {
  text-align: center;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
}

textarea {
  height: 80px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: #3b82f6;
  color: white;
  font-size: 15px;
}

#gallery {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
  margin-top: 10px;
}

.card {
  background: #1e293b;
  padding: 10px;
  border-radius: 12px;
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-radius: 10px;
  transition: opacity 0.25s ease;
}

/* smooth toggle animation */
.fade {
  opacity: 0.3;
}

.row {
  display: flex;
  gap: 6px;
  margin-top: 8px;
}

.row button {
  flex: 1;
  background: #334155;
  font-size: 12px;
  padding: 10px;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="container">

<h2>📄 Job Report</h2>

<input id="title" placeholder="Job Title">
<textarea id="desc" placeholder="Job Description"></textarea>

<input type="file" id="images" multiple accept="image/*">

<div id="gallery"></div>

<button onclick="generatePDF()">📥 Generate PDF</button>

</div>

<script>
const { jsPDF } = window.jspdf;

let imagesData = [];

/* ================= FAST UPLOAD ================= */
document.getElementById("images").addEventListener("change", async (e) => {
  const files = Array.from(e.target.files);

  // FAST batch load (better performance)
  for (let file of files) {
    const url = URL.createObjectURL(file); // ⚡ faster than base64
    imagesData.push({
      src: url,
      type: "before"
    });
  }

  render();
});

/* ================= RENDER ================= */
function render() {
  const g = document.getElementById("gallery");
  g.innerHTML = "";

  imagesData.forEach((img, i) => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img id="img-${i}" src="${img.src}">
      
      <div class="row">
        <button onclick="toggle(${i})">
          ${img.type.toUpperCase()}
        </button>

        <button onclick="removeImg(${i})">Delete</button>
      </div>
    `;

    g.appendChild(div);
  });
}

/* ================= SMOOTH TOGGLE ================= */
function toggle(i) {
  const img = document.getElementById("img-" + i);

  // smooth visual feedback
  img.classList.add("fade");

  setTimeout(() => {
    imagesData[i].type =
      imagesData[i].type === "before" ? "after" : "before";

    img.classList.remove("fade");
    render();
  }, 120);
}

/* ================= REMOVE ================= */
function removeImg(i) {
  imagesData.splice(i, 1);
  render();
}

/* ================= GROUP PAIRS ================= */
function getPairs() {
  const before = imagesData.filter(i => i.type === "before");
  const after = imagesData.filter(i => i.type === "after");

  const max = Math.max(before.length, after.length);
  const pairs = [];

  for (let i = 0; i < max; i++) {
    pairs.push({
      before: before[i],
      after: after[i]
    });
  }

  return pairs;
}

/* ================= PDF ================= */
function generatePDF() {
  const title = document.getElementById("title").value;
  const desc = document.getElementById("desc").value;

  if (!title || !desc) {
    alert("Fill all fields");
    return;
  }

  const pdf = new jsPDF("p","mm","a4");

  const margin = 10;
  const w = 210;

  const imgW = (w - margin*3)/2;
  const imgH = 80;

  const pairs = getPairs();

  let page = 1;

  for (let i = 0; i < pairs.length; i += 2) {

    if (i !== 0) pdf.addPage();

    pdf.setFontSize(14);
    pdf.text(title, margin, 15);

    pdf.setFontSize(10);
    pdf.text(desc, margin, 22, { maxWidth: 180 });

    let y = 35;

    draw(pdf, pairs[i], y, imgW, imgH, margin);

    if (pairs[i+1]) {
      draw(pdf, pairs[i+1], y + imgH + 20, imgW, imgH, margin);
    }

    pdf.text("Page " + page++, 180, 290);
  }

  pdf.save("job-report.pdf");
}

/* ================= DRAW PAIR ================= */
function draw(pdf, p, y, w, h, m) {

  pdf.setFontSize(11);
  pdf.text("Before", m, y);
  pdf.text("After", m + w + m, y);

  y += 5;

  if (p.before)
    pdf.addImage(p.before.src, "JPEG", m, y, w, h);

  if (p.after)
    pdf.addImage(p.after.src, "JPEG", m + w + m, y, w, h);

  pdf.rect(m, y, w, h);
  pdf.rect(m + w + m, y, w, h);
}
</script>

</body>
  </html>
